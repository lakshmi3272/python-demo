name: Python CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Create Virtual Environment
        run: |
          python3 -m venv venv

      - name: Install Dependencies
        run: |
          . venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Lint
        run: |
          . venv/bin/activate
          flake8 app.py

      - name: Run Unit Tests
        run: |
          . venv/bin/activate
           export PYTHONPATH=$GITHUB_WORKSPACE
          python -m pytest -v

      - name: Run Python Application
        run: |
          . venv/bin/activate
          python3 app.py